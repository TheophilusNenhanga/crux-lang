name: run crux test suite
on:
  workflow_dispatch:
    inputs:
      branch:
        description: which branch should this workflow be run against. (Default 'main')
        required: false
        default: main
        type: string
  pull_request:
    types: [opened, synchronize]
    branches:
      - "main"
    paths:
      - "**.c"
      - "**.h"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            binary_name: crux
            cmake_flags: ""

          - os: windows-latest
            platform: windows
            arch: amd64
            binary_name: crux.exe
            cmake_generator: "MSYS Makefiles"
            cmake_flags: ""

          - os: macos-latest
            platform: macos
            arch: amd64
            binary_name: crux
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

          - os: macos-latest
            platform: macos
            arch: arm64
            binary_name: crux
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=arm64"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Install GCC (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV

      - name: Setup GCC (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gcc
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV

      - name: Install MinGW (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            make

      - name: Setup GCC environment (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "CC=gcc" >> $env:GITHUB_ENV
          echo "CXX=g++" >> $env:GITHUB_ENV

      - name: Build Linux/macOS
        if: matrix.os != 'windows-latest'
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -S .. ${{ matrix.cmake_flags }}
          cmake --build .

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" -S .. -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}
          cmake --build .

      - name: Make binary executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x build/${{ matrix.binary_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run tests
        run: |
          cd tests
          python test_runner.py
